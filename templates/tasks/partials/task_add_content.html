{% load djicons i18n %}
<div data-back-url="{% url 'tasks:tasks_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Task" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'tasks:tasks_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-task-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-task-form"
          hx-post="{% url 'tasks:task_add' %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Title" %}</label>
                <input type="text" name="title" class="input input-sm w-full" placeholder="{% trans 'Title' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
                <textarea name="description" class="textarea textarea-sm w-full" rows="3"></textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Task Type" %}</label>
                <select name="task_type" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Priority" %}</label>
                <select name="priority" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <select name="status" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Due Date" %}</label>
                <input type="datetime-local" name="due_date" class="input input-sm w-full">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Completed At" %}</label>
                <input type="datetime-local" name="completed_at" class="input input-sm w-full">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Assigned To" %}</label>
                <input type="text" name="assigned_to" class="input input-sm w-full" placeholder="{% trans 'Assigned To' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Related Lead" %}</label>
                <input type="text" name="related_lead" class="input input-sm w-full" placeholder="{% trans 'Related Lead' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Duration Minutes" %}</label>
                <input type="number" name="duration_minutes" class="input input-sm w-full"  placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Result" %}</label>
                <textarea name="result" class="textarea textarea-sm w-full" rows="3"></textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Location" %}</label>
                <input type="text" name="location" class="input input-sm w-full" placeholder="{% trans 'Location' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Is Recurring" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_recurring">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Recurrence Rule" %}</label>
                <textarea name="recurrence_rule" class="textarea textarea-sm w-full" rows="3"></textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Reminder Before Minutes" %}</label>
                <input type="number" name="reminder_before_minutes" class="input input-sm w-full"  placeholder="0">
                </div>
            </div>
        </div>
    </form>
</div>
